<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>俄罗斯方块</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Microsoft YaHei', sans-serif;
        }
        
        .game-container {
            display: flex;
            gap: 30px;
            padding: 20px;
        }
        
        .left-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        h1 {
            color: #fff;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        
        canvas {
            border: 3px solid #4a4a6a;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            background: #0a0a0a;
        }
        
        .right-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .info-box {
            background: rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 10px;
            color: #fff;
            min-width: 150px;
        }
        
        .info-box h3 {
            margin-bottom: 10px;
            color: #ffd700;
        }
        
        .info-box p {
            font-size: 24px;
            font-weight: bold;
        }
        
        .next-piece {
            background: rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }
        
        .next-piece h3 {
            color: #ffd700;
            margin-bottom: 10px;
        }
        
        #nextCanvas {
            border: 2px solid #4a4a6a;
            background: #0a0a0a;
        }
        
        .controls {
            background: rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 10px;
            color: #fff;
        }
        
        .controls h3 {
            color: #ffd700;
            margin-bottom: 10px;
        }
        
        .controls p {
            font-size: 14px;
            line-height: 1.8;
        }
        
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            border-radius: 25px;
            cursor: pointer;
            margin-top: 15px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.5);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            color: #fff;
            display: none;
        }
        
        .game-over h2 {
            color: #ff6b6b;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="left-panel">
            <h1>🎮 俄罗斯方块</h1>
            <canvas id="gameCanvas" width="300" height="600"></canvas>
            <div class="game-over" id="gameOver">
                <h2>游戏结束!</h2>
                <p>最终得分: <span id="finalScore">0</span></p>
                <button class="btn" onclick="game.restart()">重新开始</button>
            </div>
        </div>
        
        <div class="right-panel">
            <div class="info-box">
                <h3>🏆 得分</h3>
                <p id="score">0</p>
            </div>
            
            <div class="info-box">
                <h3>📊 等级</h3>
                <p id="level">1</p>
            </div>
            
            <div class="info-box">
                <h3>🎯 消除行数</h3>
                <p id="lines">0</p>
            </div>
            
            <div class="next-piece">
                <h3>下一个</h3>
                <canvas id="nextCanvas" width="120" height="120"></canvas>
            </div>
            
            <div class="controls">
                <h3>⌨️ 操作说明</h3>
                <p>
                    ← → : 左右移动<br>
                    ↓ : 加速下落<br>
                    ↑ : 旋转<br>
                    空格 : 直接落地
                </p>
            </div>
            
            <button class="btn" id="startBtn" onclick="game.start()">开始游戏</button>
            <button class="btn" onclick="game.pause()">暂停/继续</button>
        </div>
    </div>

    <script>
        // 游戏配置
        const COLS = 10;
        const ROWS = 20;
        const BLOCK_SIZE = 30;
        
        // 方块形状定义
        const SHAPES = [
            // I
            [[1,1,1,1]],
            // O
            [[1,1],[1,1]],
            // T
            [[0,1,0],[1,1,1]],
            // S
            [[0,1,1],[1,1,0]],
            // Z
            [[1,1,0],[0,1,1]],
            // J
            [[1,0,0],[1,1,1]],
            // L
            [[0,0,1],[1,1,1]]
        ];
        
        // 方块颜色
        const COLORS = [
            '#00f5ff', // I - 青色
            '#ffd700', // O - 金色
            '#a855f7', // T - 紫色
            '#22c55e', // S - 绿色
            '#ef4444', // Z - 红色
            '#3b82f6', // J - 蓝色
            '#f97316'  // L - 橙色
        ];
        
        class Piece {
            constructor(type) {
                this.type = type;
                this.shape = SHAPES[type];
                this.color = COLORS[type];
                this.x = Math.floor(COLS / 2) - Math.floor(this.shape[0].length / 2);
                this.y = 0;
            }
            
            rotate() {
                const rotated = this.shape[0].map((_, i) =>
                    this.shape.map(row => row[i]).reverse()
                );
                return rotated;
            }
        }
        
        class Tetris {
            constructor() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.nextCanvas = document.getElementById('nextCanvas');
                this.nextCtx = this.nextCanvas.getContext('2d');
                
                this.board = Array(ROWS).fill(null).map(() => Array(COLS).fill(0));
                this.score = 0;
                this.level = 1;
                this.lines = 0;
                this.gameOver = false;
                this.paused = false;
                this.dropCounter = 0;
                this.dropInterval = 1000;
                this.lastTime = 0;
                
                this.currentPiece = null;
                this.nextPiece = null;
                
                this.setupControls();
            }
            
            setupControls() {
                document.addEventListener('keydown', (e) => {
                    if (this.gameOver || !this.currentPiece) return;
                    
                    if (e.key === 'p' || e.key === 'P') {
                        this.pause();
                        return;
                    }
                    
                    if (this.paused) return;
                    
                    switch(e.key) {
                        case 'ArrowLeft':
                            this.move(-1);
                            break;
                        case 'ArrowRight':
                            this.move(1);
                            break;
                        case 'ArrowDown':
                            this.drop();
                            break;
                        case 'ArrowUp':
                            this.rotate();
                            break;
                        case ' ':
                            this.hardDrop();
                            break;
                    }
                });
            }
            
            start() {
                this.board = Array(ROWS).fill(null).map(() => Array(COLS).fill(0));
                this.score = 0;
                this.level = 1;
                this.lines = 0;
                this.gameOver = false;
                this.paused = false;
                this.dropInterval = 1000;
                
                document.getElementById('gameOver').style.display = 'none';
                document.getElementById('startBtn').textContent = '重新开始';
                
                this.nextPiece = new Piece(Math.floor(Math.random() * SHAPES.length));
                this.spawnPiece();
                
                this.lastTime = performance.now();
                requestAnimationFrame(this.update.bind(this));
                
                this.updateUI();
            }
            
            restart() {
                this.start();
            }
            
            pause() {
                this.paused = !this.paused;
            }
            
            spawnPiece() {
                this.currentPiece = this.nextPiece;
                this.nextPiece = new Piece(Math.floor(Math.random() * SHAPES.length));
                
                if (this.collision(this.currentPiece, this.currentPiece.x, this.currentPiece.y)) {
                    this.endGame();
                }
                
                this.drawNext();
            }
            
            collision(piece, x, y, shape = null) {
                shape = shape || piece.shape;
                for (let r = 0; r < shape.length; r++) {
                    for (let c = 0; c < shape[r].length; c++) {
                        if (shape[r][c]) {
                            const newX = x + c;
                            const newY = y + r;
                            
                            if (newX < 0 || newX >= COLS || newY >= ROWS) {
                                return true;
                            }
                            
                            if (newY >= 0 && this.board[newY][newX]) {
                                return true;
                            }
                        }
                    }
                }
                return false;
            }
            
            move(dir) {
                if (!this.collision(this.currentPiece, this.currentPiece.x + dir, this.currentPiece.y)) {
                    this.currentPiece.x += dir;
                }
            }
            
            drop() {
                if (!this.collision(this.currentPiece, this.currentPiece.x, this.currentPiece.y + 1)) {
                    this.currentPiece.y += 1;
                    this.score += 1;
                } else {
                    this.lockPiece();
                    this.clearLines();
                    this.spawnPiece();
                }
                this.updateUI();
            }
            
            hardDrop() {
                while (!this.collision(this.currentPiece, this.currentPiece.x, this.currentPiece.y + 1)) {
                    this.currentPiece.y += 1;
                    this.score += 2;
                }
                this.lockPiece();
                this.clearLines();
                this.spawnPiece();
                this.updateUI();
            }
            
            rotate() {
                const rotated = this.currentPiece.rotate();
                let offset = 0;
                
                // 尝试旋转（带碰撞检测）
                while (this.collision(this.currentPiece, this.currentPiece.x + offset, this.currentPiece.y, rotated)) {
                    offset = offset > 0 ? -offset : -offset + 1;
                    if (Math.abs(offset) > 2) return;
                }
                
                this.currentPiece.shape = rotated;
                this.currentPiece.x += offset;
            }
            
            lockPiece() {
                for (let r = 0; r < this.currentPiece.shape.length; r++) {
                    for (let c = 0; c < this.currentPiece.shape[r].length; c++) {
                        if (this.currentPiece.shape[r][c]) {
                            const y = this.currentPiece.y + r;
                            const x = this.currentPiece.x + c;
                            if (y >= 0) {
                                this.board[y][x] = this.currentPiece.type + 1;
                            }
                        }
                    }
                }
            }
            
            clearLines() {
                let linesCleared = 0;
                
                for (let r = ROWS - 1; r >= 0; r--) {
                    if (this.board[r].every(cell => cell > 0)) {
                        this.board.splice(r, 1);
                        this.board.unshift(Array(COLS).fill(0));
                        linesCleared++;
                        r++;
                    }
                }
                
                if (linesCleared > 0) {
                    this.lines += linesCleared;
                    this.score += [0, 100, 300, 500, 800][linesCleared] * this.level;
                    this.level = Math.floor(this.lines / 10) + 1;
                    this.dropInterval = Math.max(100, 1000 - (this.level - 1) * 100);
                }
            }
            
            endGame() {
                this.gameOver = true;
                document.getElementById('finalScore').textContent = this.score;
                document.getElementById('gameOver').style.display = 'block';
            }
            
            update(time = 0) {
                if (this.gameOver) return;
                
                const deltaTime = time - this.lastTime;
                this.lastTime = time;
                
                if (!this.paused) {
                    this.dropCounter += deltaTime;
                    if (this.dropCounter > this.dropInterval) {
                        this.drop();
                        this.dropCounter = 0;
                    }
                }
                
                this.draw();
                requestAnimationFrame(this.update.bind(this));
            }
            
            draw() {
                // 清空画布
                this.ctx.fillStyle = '#0a0a0a';
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                
                // 绘制网格
                this.ctx.strokeStyle = '#1a1a1a';
                this.ctx.lineWidth = 1;
                for (let i = 0; i <= COLS; i++) {
                    this.ctx.beginPath();
                    this.ctx.moveTo(i * BLOCK_SIZE, 0);
                    this.ctx.lineTo(i * BLOCK_SIZE, this.canvas.height);
                    this.ctx.stroke();
                }
                for (let i = 0; i <= ROWS; i++) {
                    this.ctx.beginPath();
                    this.ctx.moveTo(0, i * BLOCK_SIZE);
                    this.ctx.lineTo(this.canvas.width, i * BLOCK_SIZE);
                    this.ctx.stroke();
                }
                
                // 绘制已固定的方块
                for (let r = 0; r < ROWS; r++) {
                    for (let c = 0; c < COLS; c++) {
                        if (this.board[r][c]) {
                            this.drawBlock(c, r, COLORS[this.board[r][c] - 1]);
                        }
                    }
                }
                
                // 绘制当前方块
                if (this.currentPiece) {
                    for (let r = 0; r < this.currentPiece.shape.length; r++) {
                        for (let c = 0; c < this.currentPiece.shape[r].length; c++) {
                            if (this.currentPiece.shape[r][c]) {
                                this.drawBlock(
                                    this.currentPiece.x + c,
                                    this.currentPiece.y + r,
                                    this.currentPiece.color
                                );
                            }
                        }
                    }
                    
                    // 绘制阴影
                    let shadowY = this.currentPiece.y;
                    while (!this.collision(this.currentPiece, this.currentPiece.x, shadowY + 1)) {
                        shadowY++;
                    }
                    this.ctx.globalAlpha = 0.3;
                    for (let r = 0; r < this.currentPiece.shape.length; r++) {
                        for (let c = 0; c < this.currentPiece.shape[r].length; c++) {
                            if (this.currentPiece.shape[r][c]) {
                                this.drawBlock(
                                    this.currentPiece.x + c,
                                    shadowY + r,
                                    this.currentPiece.color
                                );
                            }
                        }
                    }
                    this.ctx.globalAlpha = 1;
                }
                
                // 暂停提示
                if (this.paused) {
                    this.ctx.fillStyle = 'rgba(0,0,0,0.7)';
                    this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                    this.ctx.fillStyle = '#fff';
                    this.ctx.font = 'bold 30px Microsoft YaHei';
                    this.ctx.textAlign = 'center';
                    this.ctx.fillText('暂停中', this.canvas.width / 2, this.canvas.height / 2);
                }
            }
            
            drawBlock(x, y, color) {
                const px = x * BLOCK_SIZE;
                const py = y * BLOCK_SIZE;
                
                // 方块主体
                this.ctx.fillStyle = color;
                this.ctx.fillRect(px + 1, py + 1, BLOCK_SIZE - 2, BLOCK_SIZE - 2);
                
                // 高光
                this.ctx.fillStyle = 'rgba(255,255,255,0.3)';
                this.ctx.fillRect(px + 1, py + 1, BLOCK_SIZE - 2, 4);
                this.ctx.fillRect(px + 1, py + 1, 4, BLOCK_SIZE - 2);
                
                // 阴影
                this.ctx.fillStyle = 'rgba(0,0,0,0.3)';
                this.ctx.fillRect(px + 1, py + BLOCK_SIZE - 5, BLOCK_SIZE - 2, 4);
                this.ctx.fillRect(px + BLOCK_SIZE - 5, py + 1, 4, BLOCK_SIZE - 2);
            }
            
            drawNext() {
                this.nextCtx.fillStyle = '#0a0a0a';
                this.nextCtx.fillRect(0, 0, this.nextCanvas.width, this.nextCanvas.height);
                
                if (!this.nextPiece) return;
                
                const blockSize = 25;
                const offsetX = (this.nextCanvas.width - this.nextPiece.shape[0].length * blockSize) / 2;
                const offsetY = (this.nextCanvas.height - this.nextPiece.shape.length * blockSize) / 2;
                
                for (let r = 0; r < this.nextPiece.shape.length; r++) {
                    for (let c = 0; c < this.nextPiece.shape[r].length; c++) {
                        if (this.nextPiece.shape[r][c]) {
                            const px = offsetX + c * blockSize;
                            const py = offsetY + r * blockSize;
                            
                            this.nextCtx.fillStyle = this.nextPiece.color;
                            this.nextCtx.fillRect(px + 1, py + 1, blockSize - 2, blockSize - 2);
                            
                            this.nextCtx.fillStyle = 'rgba(255,255,255,0.3)';
                            this.nextCtx.fillRect(px + 1, py + 1, blockSize - 2, 3);
                            this.nextCtx.fillRect(px + 1, py + 1, 3, blockSize - 2);
                            
                            this.nextCtx.fillStyle = 'rgba(0,0,0,0.3)';
                            this.nextCtx.fillRect(px + 1, py + blockSize - 4, blockSize - 2, 3);
                            this.nextCtx.fillRect(px + blockSize - 4, py + 1, 3, blockSize - 2);
                        }
                    }
                }
            }
            
            updateUI() {
                document.getElementById('score').textContent = this.score;
                document.getElementById('level').textContent = this.level;
                document.getElementById('lines').textContent = this.lines;
            }
        }
        
        const game = new Tetris();
    </script>
</body>
</html>
