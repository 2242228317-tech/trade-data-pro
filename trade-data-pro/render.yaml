services:
  - type: web
    name: tradedata-api
    runtime: python
    plan: free
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: tradedata-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_KEY
        value: tradedata_admin_2024_secure
      - key: FRONTEND_URL
        value: https://tradedata-pro.vercel.app
      - key: DEBUG
        value: "false"
    healthCheckPath: /health

  - type: web
    name: tradedata-web
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    routes:
      - type: rewrite
        source: /api/**
        destination: https://tradedata-api.onrender.com/api/**

databases:
  - name: tradedata-db
    plan: free
    postgresMajorVersion: 15
